name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (Kick Assembler runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install VICE (c1541) and build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y vice build-essential curl

      - name: Install Kick Assembler
        run: |
          mkdir -p "$HOME/kickass"
          # theweb.dk rate-limits datacenter IPs (intermittent 415); retry.
          curl -fsSL -A "Mozilla/5.0" --retry 6 --retry-all-errors --retry-delay 15 \
            http://theweb.dk/KickAssembler/KickAssembler.zip -o /tmp/kickass.zip
          unzip -q /tmp/kickass.zip -d "$HOME/kickass"
          jar="$(find "$HOME/kickass" -name KickAss.jar | head -1)"
          echo "KICKASS_JAR=$jar" >> "$GITHUB_ENV"

      - name: Build exomizer 3.1.2
        run: |
          curl -fsSL https://bitbucket.org/magli143/exomizer/get/3.1.2.tar.gz \
            | tar xz
          make -C magli143-exomizer-*/src
          echo "$PWD/$(ls -d magli143-exomizer-*)/src" >> "$GITHUB_PATH"

      - name: Build the versioned d64
        run: |
          make all
          cp defmonv.d64 "defmonv-${GITHUB_REF_NAME}.d64"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: defmonv-${{ github.ref_name }}.d64
          fail_on_unmatched_files: true
          generate_release_notes: true
